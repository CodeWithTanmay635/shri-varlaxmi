spring.application.name=contact-api

# Database (H2 by default, can be overridden with env vars for Prod/PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:h2:mem:contactdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# H2 Console (disable in prod)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Security (basic auth admin password)
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Mail — SMTP
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Notification recipient (all contact messages go here)
app.notification.recipient=${NOTIFICATION_RECIPIENT}

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,https://shri-varlaxmi.onrender.com,https://www.shri-varlaxmi.shop,https://shri-varlaxmi.shop
